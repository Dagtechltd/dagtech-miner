<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DagTech — Run Your Own BlockDAG Node</title>
<link rel="icon" href="https://dapps.dagtech.network/icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b14;--fg:#f4f7fb;--primary:hsl(210 100% 56%);--glow:#66b3ff;--accent:#0a4cbf;--card:#0d1220;--border:#1a2236;--green:#4ade80;--yellow:#fbbf24;--cyan:#22d3ee;--muted:#607080;--step-done:#4ade80;--step-active:var(--primary);--step-pending:#2a3548}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 100% 50% at 50% 0%,hsl(210 100% 56%/0.04) 0%,transparent 60%);pointer-events:none}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif}

nav{position:sticky;top:0;z-index:100;background:hsl(220 50% 4%/0.9);backdrop-filter:blur(20px);border-bottom:1px solid hsl(210 100% 56%/0.08);padding:.8rem 0}
nav .inner{max-width:900px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:.6rem;text-decoration:none}
.logo img{height:28px}.logo span{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1rem;color:var(--fg)}
.nav-links{display:flex;gap:1.5rem;align-items:center}
.nav-links a{color:var(--muted);font-size:.85rem;font-weight:500;text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--fg)}

.header{text-align:center;padding:4rem 1.5rem 2rem;position:relative;z-index:1}
.header h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;background:linear-gradient(135deg,var(--fg) 30%,var(--glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);margin-top:.6rem;font-size:1.05rem;max-width:600px;margin-left:auto;margin-right:auto}
.header .back-link{display:inline-block;margin-top:1rem;color:var(--muted);font-size:.85rem;text-decoration:none;transition:color .2s}
.header .back-link:hover{color:var(--glow)}

.container{max-width:750px;margin:0 auto;padding:0 1.5rem 5rem;position:relative;z-index:1}

.progress-bar{display:flex;align-items:center;margin-bottom:2.5rem;padding:0 .5rem}
.progress-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.85rem;border:2px solid var(--step-pending);color:var(--muted);background:var(--bg);transition:all .3s;flex-shrink:0;cursor:pointer}
.progress-dot.active{border-color:var(--step-active);color:var(--primary);background:hsl(210 100% 56%/0.1);box-shadow:0 0 16px hsl(210 100% 56%/0.3)}
.progress-dot.done{border-color:var(--step-done);color:var(--bg);background:var(--step-done)}
.progress-dot.done::after{content:'\2713';position:absolute;font-size:.9rem}
.progress-dot.done span{visibility:hidden}
.progress-line{flex:1;height:2px;background:var(--step-pending);transition:background .3s;margin:0 4px}
.progress-line.done{background:var(--step-done)}.progress-line.active{background:linear-gradient(90deg,var(--step-done),var(--step-active))}

.step-card{background:linear-gradient(160deg,hsl(220 45% 9%/0.95) 0%,hsl(220 50% 5%) 100%);border:1px solid var(--border);border-radius:1.2rem;padding:2.5rem;display:none}
.step-card.active{display:block;animation:slideIn .35s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.step-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.step-number{min-width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:hsl(210 100% 56%/0.1);border:2px solid hsl(210 100% 56%/0.3);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--primary)}
.step-title{font-size:1.35rem;font-weight:700}
.step-subtitle{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:1.5rem}
.step-subtitle strong{color:var(--fg);font-weight:600}
.code-wrapper{position:relative;margin:1rem 0 1.5rem}
.code-block{background:#0a0a12;border:1px solid #1e2638;border-radius:.75rem;padding:1.2rem 1.5rem;padding-right:4.5rem;font-family:'JetBrains Mono',monospace;font-size:.85rem;line-height:1.8;color:var(--glow);overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:.7rem;right:.7rem;background:hsl(210 100% 56%/0.15);border:1px solid hsl(210 100% 56%/0.3);color:var(--glow);padding:.4rem .9rem;border-radius:.5rem;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.copy-btn:hover{background:hsl(210 100% 56%/0.25);border-color:hsl(210 100% 56%/0.5)}
.copy-btn.copied{background:hsl(140 60% 40%/0.2);border-color:var(--green);color:var(--green)}
.tip-box{background:hsl(210 100% 56%/0.06);border:1px solid hsl(210 100% 56%/0.15);border-radius:.75rem;padding:1rem 1.2rem;margin:1rem 0;display:flex;gap:.8rem;align-items:flex-start}
.tip-box .tip-icon{font-size:1.2rem;flex-shrink:0;margin-top:.1rem}
.tip-box p{color:hsl(215 30% 70%);font-size:.88rem;line-height:1.6}
.warn-box{background:hsl(40 100% 50%/0.06);border:1px solid hsl(40 100% 50%/0.15);border-radius:.75rem;padding:1rem 1.2rem;margin:1rem 0;display:flex;gap:.8rem;align-items:flex-start}
.warn-box .tip-icon{font-size:1.2rem;flex-shrink:0}
.warn-box p{color:hsl(40 80% 70%);font-size:.88rem;line-height:1.6}
.term-preview{background:#0c0c0c;border:1px solid #1e2638;border-radius:.75rem;overflow:hidden;margin:1rem 0}
.term-bar{background:#1a1a2e;padding:.5rem .8rem;display:flex;align-items:center;gap:.5rem}
.term-bar-label{margin-left:.6rem;color:var(--muted);font-size:.72rem;font-family:'JetBrains Mono',monospace}
.term-out{padding:1rem 1.2rem;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.8;color:#9ca3af}
.term-out .g{color:var(--green)}.term-out .b{color:var(--glow)}.term-out .c{color:var(--cyan)}.term-out .w{color:var(--yellow)}
.step-nav{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.btn{padding:.85rem 2rem;border-radius:.85rem;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.95rem;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:.5rem}
.btn-next{background:linear-gradient(135deg,var(--primary),var(--accent));color:white;box-shadow:0 0 20px hsl(210 100% 56%/0.3)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 0 30px hsl(210 100% 56%/0.5)}
.btn-prev{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.btn-prev:hover{color:var(--fg);border-color:hsl(210 100% 56%/0.2)}
.btn-hidden{visibility:hidden}
.btn-dash{background:linear-gradient(135deg,var(--green),#059669);color:#0a0f1a;box-shadow:0 0 24px hsl(140 60% 40%/0.3);font-size:1rem;padding:1rem 2.5rem;text-decoration:none}
.btn-dash:hover{transform:translateY(-2px);box-shadow:0 0 36px hsl(140 60% 40%/0.5);color:#0a0f1a}
.final-box{text-align:center;padding:1rem 0}
.final-box h2{font-size:1.8rem;margin-bottom:.5rem;color:var(--green)}
.final-box p{color:var(--muted);margin-bottom:2rem;font-size:1rem}
@media(max-width:600px){.step-card{padding:1.5rem}.progress-dot{width:30px;height:30px;font-size:.75rem}.code-block{font-size:.78rem;padding-right:1rem}.copy-btn{position:static;display:block;margin-top:.5rem;text-align:center}.nav-links{display:none}}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border)}
footer a{color:var(--primary);text-decoration:none}
</style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="/" class="logo">
      <img src="https://dapps.dagtech.network/icon.svg" alt="DagTech">
      <span>DagTech Miner</span>
    </a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="install.html">Mine with Us</a>
      <a href="https://github.com/Dagtechltd/dagtech-miner" target="_blank">GitHub</a>
    </div>
  </div>
</nav>

<div class="header">
  <h1>Run Your Own BlockDAG Node</h1>
  <p>Deploy a full QNG node with Docker. Participate in consensus, run your own pool, or explore the chain independently.</p>
  <a href="/" class="back-link">&larr; Back to DagTech Miner</a>
</div>

<div class="container">
  <div class="progress-bar" id="progress-bar"></div>
  <div id="steps-container"></div>
</div>

<footer>
  &copy; 2024-2026 <a href="https://dagtech.network">DagTech Ltd</a> &bull; By Dawie Nel &bull; <a href="install.html">Mine instead &rarr;</a>
</footer>

<script>
const steps = [
  {
    title: 'Prerequisites',
    subtitle: 'You need a <strong>Linux server</strong> (Ubuntu 22.04 recommended) with at least <strong>4 CPU cores, 16GB RAM, and 500GB SSD</strong>. The node syncs the full BlockDAG chain which grows over time.',
    tip: 'A VPS from Hetzner, OVH, or Contabo works great. Bare metal is even better. The more RAM, the faster your node handles DAG reorgs.',
    preview: ['<span class="b">Minimum requirements:</span>', '  CPU:     4 cores (8+ recommended)', '  RAM:     16 GB (32+ recommended)', '  Disk:    500 GB SSD (NVMe preferred)', '  OS:      Ubuntu 22.04 LTS', '  Network: Public IP with port 8130 open']
  },
  {
    title: 'Install Docker',
    subtitle: 'The BlockDAG node runs in Docker containers. Install Docker Engine and Docker Compose if you don\'t already have them.',
    cmd: 'curl -fsSL https://get.docker.com | sh\nsudo usermod -aG docker $USER\nnewgrp docker',
    tip: 'After adding yourself to the docker group, you may need to log out and back in for the group change to take effect.',
    preview: ['<span class="b">$</span> curl -fsSL https://get.docker.com | sh', '<span class="g">Docker Engine installed successfully</span>', '<span class="b">$</span> docker --version', '<span class="g">Docker version 27.x.x, build xxxxxxx</span>']
  },
  {
    title: 'Clone BlockDAG Scripts',
    subtitle: 'Download the official BlockDAG deployment scripts from GitHub. These contain the Docker Compose configuration for the QNG node.',
    cmd: 'git clone https://github.com/BlockdagNetworkLabs/blockdag-scripts.git\ncd blockdag-scripts',
    preview: ['<span class="b">$</span> git clone https://github.com/BlockdagNetworkLabs/blockdag-scripts.git', 'Cloning into \'blockdag-scripts\'...', '<span class="g">Receiving objects: 100%, done.</span>', '<span class="b">$</span> cd blockdag-scripts']
  },
  {
    title: 'Configure Your Node',
    subtitle: 'Edit the <strong>.env</strong> file to set your wallet address and node parameters. The key settings are your wallet (for mining rewards if solo mining) and network ports.',
    cmd: 'cp .env.example .env\nnano .env',
    warn: 'Make sure port <strong>8130</strong> (TCP+UDP) is open on your firewall and forwarded on your router. This is the P2P port that other nodes use to connect to you.',
    preview: ['<span class="c"># .env configuration</span>', '<span class="b">WALLET</span>=0xYOUR_WALLET_ADDRESS_HERE', '<span class="b">P2P_PORT</span>=8130', '<span class="b">RPC_PORT</span>=38131', '<span class="b">EVM_RPC_PORT</span>=18545', '<span class="b">MAX_PEERS</span>=200', '<span class="b">CACHE_SIZE</span>=16384']
  },
  {
    title: 'System Tuning',
    subtitle: 'For optimal performance, increase file descriptor limits and tune network parameters. This helps the node handle hundreds of P2P connections without dropping peers.',
    cmd: 'echo "fs.file-max = 2097152" | sudo tee -a /etc/sysctl.d/99-blockdag.conf\necho "net.core.somaxconn = 32768" | sudo tee -a /etc/sysctl.d/99-blockdag.conf\nsudo sysctl -p /etc/sysctl.d/99-blockdag.conf',
    tip: 'Also set <code style="color:var(--glow)">ulimit -n 65536</code> in your shell profile. The QNG node opens many connections — Linux defaults (1024) are too low.',
    preview: ['<span class="b">$</span> sudo sysctl -p /etc/sysctl.d/99-blockdag.conf', '<span class="g">fs.file-max = 2097152</span>', '<span class="g">net.core.somaxconn = 32768</span>']
  },
  {
    title: 'Launch the Node',
    subtitle: 'Start the QNG node with Docker Compose. The node will begin syncing the BlockDAG chain from genesis. <strong>Initial sync takes several hours</strong> depending on your hardware and internet speed.',
    cmd: 'docker compose up -d',
    preview: ['<span class="b">$</span> docker compose up -d', '<span class="g">[+] Running 1/1</span>', '<span class="g"> ✓ Container qng-node  Started</span>', '', '<span class="b">$</span> docker logs qng-node --tail 5', '<span class="c">[INFO] MeerDAG: Syncing blocks...</span>', '<span class="c">[INFO] Peers: 47 connected</span>', '<span class="c">[INFO] DAG height: 1,847,293</span>', '<span class="g">[INFO] EVM RPC listening on :18545</span>'],
    tip: 'Monitor sync progress with <code style="color:var(--glow)">docker logs qng-node -f</code>. The node is fully synced when you see new blocks arriving every ~12 seconds.'
  },
  {
    title: 'Verify Your Node',
    subtitle: 'Once synced, verify your node is healthy by checking block count, peer count, and EVM RPC. Your node is now a full participant in BlockDAG consensus!',
    cmd: 'curl -s -u test:test -H "Content-Type: application/json" \\\n  -d \'{"jsonrpc":"1.0","id":1,"method":"getBlockCount"}\' \\\n  http://127.0.0.1:38131',
    preview: ['<span class="b">$</span> curl -s ... getBlockCount', '<span class="g">{"result": 1847293, "error": null}</span>', '', '<span class="b">$</span> curl -s ... getNodeInfo', '<span class="g">{"result": {"peers": 47, "version": "1.3.21"}}</span>', '', '<span class="b">$</span> curl -s -X POST -H "Content-Type: application/json" \\', '  -d \'{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}\' \\', '  http://127.0.0.1:18545', '<span class="g">{"result": "0x1c2d3e"}</span>'],
    final: true,
    dashUrl: null
  }
];

let currentStep = 0;

function render() {
  const total = steps.length;
  const pb = document.getElementById('progress-bar');
  let pbHtml = '';
  for (let i = 0; i < total; i++) {
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    pbHtml += `<div class="progress-dot ${cls}" onclick="goTo(${i})" title="Step ${i+1}"><span>${i+1}</span></div>`;
    if (i < total - 1) {
      const lc = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
      pbHtml += `<div class="progress-line ${lc}"></div>`;
    }
  }
  pb.innerHTML = pbHtml;

  const sc = document.getElementById('steps-container');
  let html = '';
  for (let i = 0; i < total; i++) {
    const s = steps[i];
    const active = i === currentStep ? 'active' : '';
    html += `<div class="step-card ${active}">`;
    html += `<div class="step-header"><div class="step-number">${i+1}</div><h3 class="step-title">${s.title}</h3></div>`;
    html += `<p class="step-subtitle">${s.subtitle}</p>`;
    if (s.warn) html += `<div class="warn-box"><span class="tip-icon">&#9888;&#65039;</span><p>${s.warn}</p></div>`;
    if (s.cmd) {
      html += `<div class="code-wrapper"><div class="code-block">${esc(s.cmd)}</div>`;
      html += `<button class="copy-btn" onclick="copyCmd(this,${i})">Copy</button></div>`;
    }
    if (s.tip) html += `<div class="tip-box"><span class="tip-icon">&#128161;</span><p>${s.tip}</p></div>`;
    if (s.preview) {
      html += `<div class="term-preview"><div class="term-bar"><span style="color:var(--green);font-size:.8rem;font-weight:700">&#9638;</span><span class="term-bar-label">node@server: ~</span></div>`;
      html += `<div class="term-out">${s.preview.join('<br>')}</div></div>`;
    }
    if (s.final) {
      html += `<div class="final-box"><h2>&#9889; Node Running!</h2>`;
      html += `<p>Your QNG node is synced and participating in BlockDAG consensus. You can query the chain, deploy smart contracts, or run a block explorer.</p>`;
      html += `<p style="color:var(--muted);font-size:.85rem;margin-top:1.5rem;">Want to start earning BDAG? Install <a href="install.html" style="color:var(--glow);font-weight:600;">DagTech Miner</a> and connect to our community pool — no extra setup needed.</p>`;
      html += `</div>`;
    }
    html += `<div class="step-nav">`;
    html += i > 0 ? `<button class="btn btn-prev" onclick="prev()">&larr; Back</button>` : `<span class="btn-hidden btn"></span>`;
    html += i < total-1 ? `<button class="btn btn-next" onclick="next()">Next Step &rarr;</button>` : `<span></span>`;
    html += `</div></div>`;
  }
  sc.innerHTML = html;
}
function next(){if(currentStep<steps.length-1){currentStep++;render();window.scrollTo({top:200,behavior:'smooth'})}}
function prev(){if(currentStep>0){currentStep--;render();window.scrollTo({top:200,behavior:'smooth'})}}
function goTo(i){currentStep=i;render();window.scrollTo({top:200,behavior:'smooth'})}
function copyCmd(btn,i){navigator.clipboard.writeText(steps[i].cmd).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},2000)})}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
render();
</script>
</body>
</html>
